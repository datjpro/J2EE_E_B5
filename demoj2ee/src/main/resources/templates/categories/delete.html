<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments :: head('Xoa danh muc')}"></head>
  <body>
    <div class="page">
      <div th:replace="~{fragments :: nav('categories')}"></div>
      <main class="content">
        <section class="hero">
          <div>
            <p class="eyebrow">Xac nhan</p>
            <h1>Xoa danh muc</h1>
            <p class="subtitle">Hanh dong nay khong the hoan tac.</p>
          </div>
          <a class="button ghost" th:href="@{/categories}">Quay lai danh sach</a>
        </section>

        <section class="card">
          <div class="confirm-grid confirm-single">
            <div>
              <h2 th:text="${category.name}"></h2>
              <p class="meta">Ban chac chan muon xoa danh muc nay?</p>
              <form th:action="@{'/categories/' + ${category.id} + '/delete'}" method="post">
                <div class="actions">
                  <button class="button danger" type="submit">Xoa ngay</button>
                  <a class="button ghost" th:href="@{/categories}">Huy</a>
                </div>
              </form>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
