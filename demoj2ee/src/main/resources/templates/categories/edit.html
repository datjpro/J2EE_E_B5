<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments :: head('Cap nhat danh muc')}"></head>
  <body>
    <div class="page">
      <div th:replace="~{fragments :: nav('categories')}"></div>
      <main class="content">
        <section class="hero">
          <div>
            <p class="eyebrow">Bieu mau</p>
            <h1 th:text="${submitLabel} + ' danh muc'"></h1>
            <p class="subtitle">Cap nhat ten danh muc.</p>
          </div>
          <a class="button ghost" th:href="@{/categories}">Quay lai danh sach</a>
        </section>

        <section class="card form-card">
          <form th:action="@{${formAction}}" method="post" th:object="${category}">
            <div class="field">
              <label for="name">Ten danh muc</label>
              <input id="name" type="text" th:field="*{name}" />
              <p class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
            </div>

            <div class="actions">
              <button class="button primary" type="submit" th:text="${submitLabel}"></button>
              <a class="button ghost" th:href="@{/categories}">Huy</a>
            </div>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>
